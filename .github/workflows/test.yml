name: CI
run-name: ${{ github.actor }} 

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env: 
  GITHUB_ACTIONS: "True"  
  
jobs:
  github-task-job:
    runs-on: ubuntu-latest 
    
    steps:
      - run: echo "${{ env.GITHUB_ACTIONS }}"
      - run: echo "${{ github.action_repository }}"
      - run: echo "${{ github.head_ref }}"

   
